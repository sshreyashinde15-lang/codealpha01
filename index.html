<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
/* ===== BODY ===== */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
    text-align: center;
}

h1 {
    margin: 20px;
}

/* ===== FILTER BUTTONS ===== */
.filters {
    margin-bottom: 10px;
}

.filters button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    background: #333;
    color: white;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}

.filters button:hover,
.filters button.active {
    background: #ff9800;
}

/* ===== GALLERY GRID ===== */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.4s, filter 0.4s;
}

.gallery img:hover {
    transform: scale(1.05);
    filter: brightness(80%);
}

/* ===== LIGHTBOX ===== */
.lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 1000;
}

.lightbox img {
    width: 60%;
    max-width: 700px;
    border-radius: 10px;
    margin: 15px 0;
}

.lightbox button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    background: #ff9800;
    color: white;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}

.lightbox button:hover {
    background: #e68900;
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
    .lightbox img{
        width: 90%;
    }
}
</style>
</head>

<body>

<h1>Image Gallery</h1>

<div class="filters">
    <button class="active" onclick="filterImages('all', this)">All</button>
    <button onclick="filterImages('nature', this)">Nature</button>
    <button onclick="filterImages('city', this)">City</button>
</div>

<div class="gallery">
    <img src="https://picsum.photos/400/300?1" class="nature">
    <img src="https://picsum.photos/400/300?2" class="city">
    <img src="https://picsum.photos/400/300?3" class="nature">
    <img src="https://picsum.photos/400/300?4" class="city">
</div>

<div class="lightbox" id="lightbox" onclick="outsideClick(event)">
    <button onclick="prevImage()">Prev</button>
    <img id="lightbox-img">
    <button onclick="nextImage()">Next</button>
    <button onclick="closeLightbox()">Close</button>
</div>

<script>
let images = document.querySelectorAll(".gallery img");
let lightbox = document.getElementById("lightbox");
let lightboxImg = document.getElementById("lightbox-img");
let currentIndex = 0;

// Open Lightbox
images.forEach((img, index) => {
    img.addEventListener("click", () => {
        lightbox.style.display = "flex";
        lightboxImg.src = img.src;
        currentIndex = index;
    });
});

// Close Lightbox
function closeLightbox(){
    lightbox.style.display = "none";
}

// Next Image
function nextImage(){
    currentIndex = (currentIndex + 1) % images.length;
    lightboxImg.src = images[currentIndex].src;
}

// Previous Image
function prevImage(){
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    lightboxImg.src = images[currentIndex].src;
}

// Filter Images
function filterImages(category, btn){
    images.forEach(img => {
        if(category === "all" || img.classList.contains(category)){
            img.style.display = "block";
        } else {
            img.style.display = "none";
        }
    });

    // Active button highlight
    document.querySelectorAll(".filters button")
        .forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

// Close if clicked outside image
function outsideClick(e){
    if(e.target === lightbox){
        closeLightbox();
    }
}
</script>

</body>
</html>
